<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Finder but Better</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --rail-width: 52px;
      --bg-dark: #131314;
      --text-primary: #e3e3e3;
      --text-muted: #8e8e8e;
      --input-bg: #1e1f20;
      --input-hover: #282a2c;
      --rail-hover: rgba(255, 255, 255, 0.08);
      --font: "Söhne", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      color: var(--text-primary);
      overflow: hidden;
      background: var(--bg-dark);
    }

    /* Living-room background at 60% opacity */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("assets/background.png") center / cover no-repeat;
      opacity: 0.6;
      z-index: -2;
    }

    /* Dark overlay + subtle center glow */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 45%, rgba(60, 80, 140, 0.18) 0%, transparent 70%),
        rgba(19, 19, 20, 0.72);
      z-index: -1;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    /* ── Icon rail (left sidebar) ── */
    .rail {
      width: var(--rail-width);
      min-width: var(--rail-width);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      z-index: 10;
    }

    .rail-top,
    .rail-bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .rail-bottom {
      margin-top: auto;
    }

    .rail-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .rail-btn:hover {
      background: var(--rail-hover);
      color: var(--text-primary);
    }

    .rail-btn svg {
      width: 20px;
      height: 20px;
    }

    .rail-logo {
      width: 28px;
      height: 28px;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .rail-logo svg {
      width: 100%;
      height: 100%;
    }

    .rail-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      margin-top: 4px;
    }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }

    .top-right {
      position: absolute;
      top: 16px;
      right: 20px;
      z-index: 5;
    }

    .top-right .rail-btn {
      color: var(--text-muted);
    }

    /* ── Landing (start page) ── */
    .landing {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 36px;
    }

    .greeting {
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 400;
      color: var(--text-primary);
      text-align: center;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .brand-tagline {
      font-size: 15px;
      color: var(--text-muted);
      text-align: center;
      margin-top: -24px;
      letter-spacing: 0.01em;
    }

    .landing-input-wrap {
      width: 100%;
      max-width: 720px;
    }

    .prewritten-section {
      width: 100%;
      max-width: 720px;
      margin-top: 14px;
      display: flex;
      justify-content: center;
    }

    .prewritten-btn {
      padding: 10px 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      background: rgba(30, 31, 32, 0.75);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .prewritten-btn:hover {
      background: rgba(40, 42, 44, 0.9);
      border-color: rgba(255, 255, 255, 0.18);
    }

    /* ── Shared input bar ── */
    .input-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--input-bg);
      border-radius: 28px;
      padding: 6px 8px 6px 6px;
      transition: background 0.15s;
    }

    .input-bar:hover,
    .input-bar:focus-within {
      background: var(--input-hover);
    }

    .input-bar textarea {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-primary);
      font-size: 16px;
      font-family: inherit;
      resize: none;
      line-height: 1.5;
      padding: 10px 4px 10px 16px;
      max-height: 200px;
      min-height: 24px;
    }

    .input-bar textarea::placeholder {
      color: var(--text-muted);
    }

    .input-bar-right {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .send-btn {
      display: none;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: #fff;
      color: #131314;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .send-btn.visible {
      display: flex;
    }

    .send-btn.visible:hover {
      background: #e3e3e3;
    }

    /* ── Chat view (after first message) ── */
    .chat-view {
      flex: 1;
      display: none;
      flex-direction: column;
      min-height: 0;
    }

    .chat-view.active {
      display: flex;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 60px 24px 24px;
      scrollbar-width: thin;
      scrollbar-color: #444 transparent;
    }

    .messages-inner {
      max-width: 768px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .message {
      display: flex;
      gap: 16px;
      line-height: 1.65;
      font-size: 16px;
    }

    .message-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
    }

    .message.user .message-avatar {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff;
    }

    .message.assistant .message-avatar {
      background: #fff;
      color: #131314;
    }

    .message.assistant .message-avatar svg {
      width: 16px;
      height: 16px;
    }

    .message-content {
      flex: 1;
      padding-top: 2px;
      min-width: 0;
      color: var(--text-primary);
    }

    .message.user .message-content {
      color: #d4d4d4;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .chat-input-area {
      padding: 16px 24px 28px;
      display: flex;
      justify-content: center;
    }

    .chat-input-area .landing-input-wrap {
      max-width: 768px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Icon-only sidebar -->
    <nav class="rail">
      <div class="rail-top">
        <div class="rail-logo" title="Property Finder but Better">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 3 2 12h3v9h6v-6h2v6h6v-9h3L12 3zm0 2.84L18 11.5V19h-2v-6H8v6H6v-7.5L12 5.84z"/>
          </svg>
        </div>

        <!--
        <button class="rail-btn" id="new-chat" title="New search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>
          </svg>
        </button>

        <button class="rail-btn" title="Search properties">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          </svg>
        </button>

        <button class="rail-btn" title="Recent searches">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
          </svg>
        </button>

        <button class="rail-btn" title="Saved homes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </button>

        <button class="rail-btn" title="Explore areas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
          </svg>
        </button>
        -->
      </div>

      <div class="rail-bottom">
        <!--
        <button class="rail-btn" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
        -->
        <div class="rail-avatar" title="Profile">H</div>
      </div>
    </nav>

    <main class="main">
      <div class="top-right">
        <button class="rail-btn" title="Temporary chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-dasharray="3 3">
            <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3" stroke-dasharray="0"/>
          </svg>
        </button>
      </div>

      <!-- Start page -->
      <section class="landing" id="landing">
        <h1 class="greeting">Property Finder but Better</h1>
        <!-- <p class="brand-tagline">Property Finder but Better</p> -->
        <div class="landing-input-wrap">
          <div class="input-bar">
            <textarea id="landing-input" rows="1" placeholder="Let us get you your dream home" autofocus></textarea>
            <div class="input-bar-right">
              <button class="send-btn" id="landing-send" title="Send">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 2L4 12h6v10l8-12h-6V2z"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="prewritten-section">
            <button
              type="button"
              class="prewritten-btn"
              id="prewritten-hub71"
              data-prompt="I am looking for a room, I work at Hub71 and my kids are in ISC Khalifa (SABIS). I have 3 kids and I want to be in close proxomity to all"
            >Pre-written prompt</button>
          </div>
        </div>
      </section>

      <!-- Chat view -->
      <section class="chat-view" id="chat-view">
        <div class="messages" id="messages">
          <div class="messages-inner" id="messages-inner"></div>
        </div>
        <div class="chat-input-area">
          <div class="landing-input-wrap">
            <div class="input-bar">
              <textarea id="chat-input" rows="1" placeholder="Search properties, areas, or budgets…"></textarea>
              <div class="input-bar-right">
                <button class="send-btn" id="chat-send" title="Send">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2L4 12h6v10l8-12h-6V2z"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const PRODUCT_NAME = "Property Finder but Better";
    const ASSISTANT_ICON = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3 2 12h3v9h6v-6h2v6h6v-9h3L12 3z"/></svg>`;

    const CONFIG = {
      API_URL: "/api/chat",
      MODEL: "claude-sonnet-4-6",
    };

    const landing = document.getElementById("landing");
    const chatView = document.getElementById("chat-view");
    const messagesInner = document.getElementById("messages-inner");
    const messagesScroll = document.getElementById("messages");

    const landingInput = document.getElementById("landing-input");
    const chatInput = document.getElementById("chat-input");
    const landingSend = document.getElementById("landing-send");
    const chatSend = document.getElementById("chat-send");

    let conversationHistory = [];
    let activeInput = landingInput;

    function setupInput(input, sendBtn) {
      input.addEventListener("input", () => {
        input.style.height = "auto";
        input.style.height = Math.min(input.scrollHeight, 200) + "px";
        sendBtn.classList.toggle("visible", input.value.trim().length > 0);
      });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          if (input.value.trim()) sendMessage(input);
        }
      });

      sendBtn.addEventListener("click", () => {
        if (input.value.trim()) sendMessage(input);
      });
    }

    setupInput(landingInput, landingSend);
    setupInput(chatInput, chatSend);

    document.getElementById("prewritten-hub71").addEventListener("click", () => {
      const prompt = document.getElementById("prewritten-hub71").dataset.prompt;
      landingInput.value = prompt;
      landingInput.dispatchEvent(new Event("input"));
      sendMessage(landingInput);
    });

    // document.getElementById("new-chat").addEventListener("click", resetChat);

    function resetChat() {
      conversationHistory = [];
      messagesInner.innerHTML = "";
      landing.classList.remove("hidden");
      chatView.classList.remove("active");
      landingInput.value = "";
      chatInput.value = "";
      landingInput.dispatchEvent(new Event("input"));
      chatInput.dispatchEvent(new Event("input"));
      landingInput.focus();
      activeInput = landingInput;
    }

    function switchToChat() {
      landing.classList.add("hidden");
      chatView.classList.add("active");
      activeInput = chatInput;
      chatInput.focus();
    }

    function appendMessage(role, content) {
      switchToChat();

      const div = document.createElement("div");
      div.className = `message ${role}`;

      const avatar = document.createElement("div");
      avatar.className = "message-avatar";

      if (role === "user") {
        avatar.textContent = "H";
      } else {
        avatar.innerHTML = ASSISTANT_ICON;
      }

      const body = document.createElement("div");
      body.className = "message-content";
      body.textContent = content;

      div.appendChild(avatar);
      div.appendChild(body);
      messagesInner.appendChild(div);
      messagesScroll.scrollTop = messagesScroll.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement("div");
      div.className = "message assistant";
      div.id = "typing";
      div.innerHTML = `
        <div class="message-avatar">
          ${ASSISTANT_ICON}
        </div>
        <div class="message-content">
          <div class="typing-indicator"><span></span><span></span><span></span></div>
        </div>
      `;
      messagesInner.appendChild(div);
      messagesScroll.scrollTop = messagesScroll.scrollHeight;
    }

    function removeTyping() {
      document.getElementById("typing")?.remove();
    }

    async function sendMessage(input) {
      const text = input.value.trim();
      if (!text) return;

      input.value = "";
      input.style.height = "auto";
      input.dispatchEvent(new Event("input"));

      appendMessage("user", text);
      conversationHistory.push({ role: "user", content: text });

      showTyping();

      try {
        const response = await fetch(CONFIG.API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: CONFIG.MODEL, messages: conversationHistory }),
        });

        removeTyping();

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(data.error || `API error ${response.status}`);
        }

        appendMessage("assistant", data.reply);
        conversationHistory.push({ role: "assistant", content: data.reply });
      } catch (err) {
        removeTyping();
        appendMessage("assistant", `Error: ${err.message}`);
      }
    }
  </script>
</body>
</html>
